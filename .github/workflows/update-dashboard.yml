name: Daily Safety Update

on:
schedule:
# 매일 한국시간 오전 8시 실행 (UTC 23:00)
- cron: '0 23 * * *'
workflow_dispatch:

jobs:
update:
runs-on: ubuntu-latest

```
permissions:
  contents: write

steps:
  - name: 저장소 체크아웃
    uses: actions/checkout@v4

  - name: 마지막 업데이트 시간 갱신
    run: |
      echo '{"updated":"'$(date -u -d '+9 hours' '+%Y-%m-%d %H:%M')'"}' > docs/data/last_update.json

  - name: 변경사항 커밋 및 푸시
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git add docs/data/last_update.json
      git commit -m "Auto update last update time" || echo "No changes to commit"
      git push
```
