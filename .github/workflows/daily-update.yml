name: Daily Safety Update

on:
  schedule:
  - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update last_update.json
        run: |
          KST_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')
          echo "{\\"updated\\": \\"$KST_TIME\\"}" > docs/data/last_update.json
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/last_update.json
          git commit -m "Update last update time" || echo "No changes"
          git push
