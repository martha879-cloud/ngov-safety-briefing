name: Daily Safety Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

jobs:
  update:
runs-on: ubuntu-latest

permissions:
  contents: write

steps:
  - name: 저장소 체크아웃
    uses: actions/checkout@v4

  - name: 마지막 업데이트 시간 갱신
    run: |
      KST_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')
      echo "{\\"updated\\": \\"$KST_TIME\\"}" > docs/data/last_update.json

  - name: 변경사항 커밋 및 푸시
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git add docs/data/last_update.json
      git commit -m "Auto update last update time" || echo "No changes to commit"
      git push
