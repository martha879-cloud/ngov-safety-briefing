name: Daily Safety Update

on:
  schedule:
    # UTC 22:00 = 한국시간 오전 7시
    - cron: "0 22 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install requests beautifulsoup4 feedparser lxml

      - name: Run update
        run: |
          python scripts/update_data.py

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add docs/data/

          git diff --cached --quiet || git commit -m "Daily Safety Update"

          git push
